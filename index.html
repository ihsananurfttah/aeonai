<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÆON - Asisten AI (Client Only)</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body {
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .bg-blobs {
      position: fixed;
      top:0; left:0; width:100%; height:100%; z-index:0;
      overflow:hidden; pointer-events:none;
    }
    .blob {
      position:absolute; border-radius:50%;
      background:rgba(200,220,255,0.25); filter:blur(80px);
      animation: floatBlob 18s infinite alternate ease-in-out;
    }
    .blob:nth-child(1) { width:400px; height:400px; top:-10%; left:-10%; animation-duration:22s; background:rgba(180,210,255,0.3); }
    .blob:nth-child(2) { width:500px; height:500px; bottom:-20%; right:-15%; animation-duration:26s; animation-delay:-4s; background:rgba(220,240,255,0.2); }
    .blob:nth-child(3) { width:300px; height:300px; top:40%; left:60%; animation-duration:20s; animation-delay:-8s; background:rgba(190,215,245,0.2); }
    @keyframes floatBlob {
      0% { transform: translate(0,0) scale(1); }
      33% { transform: translate(40px,-30px) scale(1.1); }
      66% { transform: translate(-20px,40px) scale(0.9); }
      100% { transform: translate(30px,-20px) scale(1.05); }
    }
    #app {
      position:relative; z-index:1;
      width:100%; max-width:820px; height:92vh; max-height:820px;
      background:rgba(255,255,255,0.78); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-radius:40px; box-shadow:0 30px 70px rgba(0,20,40,0.08), 0 0 0 1px rgba(255,255,255,0.7) inset;
      display:flex; flex-direction:column; overflow:hidden;
    }
    header {
      padding:18px 28px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid rgba(0,0,0,0.04); flex-shrink:0; flex-wrap:wrap; gap:12px;
    }
    .logo-area { display:flex; align-items:center; gap:12px; }
    .logo { font-size:26px; font-weight:700; letter-spacing:-0.5px; background:linear-gradient(135deg,#1a2639,#2c3e5a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo small { font-size:14px; font-weight:400; -webkit-text-fill-color:#7a8a9e; color:#7a8a9e; margin-left:6px; }
    .mode-toggle { display:flex; background:rgba(0,0,0,0.04); border-radius:40px; padding:4px; gap:4px; }
    .mode-btn { border:none; background:transparent; padding:8px 22px; border-radius:30px; font-size:14px; font-weight:600; color:#4a5a6e; cursor:pointer; transition:all 0.25s; }
    .mode-btn.active { background:#ffffff; color:#0b1a2a; box-shadow:0 4px 12px rgba(0,20,40,0.08); }
    .mode-btn:hover:not(.active) { color:#0b1a2a; }
    .api-section { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .api-section input { background:rgba(255,255,255,0.6); border:1px solid rgba(0,0,0,0.08); padding:8px 16px; border-radius:30px; font-size:13px; color:#1a2639; width:190px; outline:none; backdrop-filter:blur(4px); }
    .api-section input:focus { border-color:#2c3e5a; background:#ffffff; }
    .api-btn { background:#0b1a2a; color:white; border:none; padding:8px 18px; border-radius:30px; font-size:13px; font-weight:500; cursor:pointer; transition:background 0.2s; }
    .api-btn:hover { background:#1c3148; }
    #chatContainer { flex:1; overflow-y:auto; padding:24px 28px 10px 28px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
    #chatContainer::-webkit-scrollbar { width:4px; }
    #chatContainer::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.1); border-radius:10px; }
    .message { max-width:78%; padding:14px 20px; border-radius:22px; line-height:1.6; font-size:15px; word-wrap:break-word; animation-duration:0.4s; animation-fill-mode:both; box-shadow:0 2px 8px rgba(0,0,0,0.02); }
    .message.user { align-self:flex-end; background:#ffffff; color:#0b1a2a; border:1px solid rgba(0,0,0,0.04); border-bottom-right-radius:6px; animation-name:slideInRight; }
    .message.ai { align-self:flex-start; background:#f0f4fc; color:#1a2639; border:1px solid rgba(255,255,255,0.6); border-bottom-left-radius:6px; animation-name:slideInLeft; }
    .message.ai .sender { font-weight:600; font-size:13px; color:#2c3e5a; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .message.ai .sender span { background:#0b1a2a; color:white; font-size:10px; padding:2px 10px; border-radius:20px; font-weight:500; }
    @keyframes slideInRight { from{opacity:0; transform:translateX(30px);} to{opacity:1; transform:translateX(0);} }
    @keyframes slideInLeft { from{opacity:0; transform:translateX(-30px);} to{opacity:1; transform:translateX(0);} }
    .typing-indicator { align-self:flex-start; background:#f0f4fc; padding:14px 24px; border-radius:22px; border-bottom-left-radius:6px; display:flex; align-items:center; gap:6px; animation:slideInLeft 0.3s both; }
    .typing-dot { width:10px; height:10px; background:#7a8a9e; border-radius:50%; display:inline-block; animation:bounceDot 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay:-0.32s; }
    .typing-dot:nth-child(2) { animation-delay:-0.16s; }
    .typing-dot:nth-child(3) { animation-delay:0s; }
    @keyframes bounceDot { 0%,80%,100%{transform:scale(0.6); opacity:0.4;} 40%{transform:scale(1); opacity:1;} }
    footer { padding:16px 28px 24px 28px; border-top:1px solid rgba(0,0,0,0.04); display:flex; gap:12px; align-items:center; flex-shrink:0; background:rgba(255,255,255,0.3); backdrop-filter:blur(4px); }
    footer input { flex:1; background:rgba(255,255,255,0.7); border:1px solid rgba(0,0,0,0.06); padding:14px 22px; border-radius:40px; font-size:15px; color:#0b1a2a; outline:none; }
    footer input:focus { border-color:#2c3e5a; background:#ffffff; box-shadow:0 4px 14px rgba(0,20,40,0.04); }
    footer button { background:#0b1a2a; color:white; border:none; padding:14px 32px; border-radius:40px; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; white-space:nowrap; }
    footer button:hover { background:#1c3148; }
    footer button:disabled { opacity:0.5; pointer-events:none; }
    @media (max-width:700px) {
      header { flex-direction:column; align-items:stretch; gap:12px; padding:16px 20px; }
      .logo-area, .mode-toggle, .api-section { justify-content:center; flex-wrap:wrap; }
      .api-section input { width:100%; flex:1; min-width:120px; }
      #app { max-height:98vh; border-radius:24px; }
      #chatContainer { padding:16px 16px 8px 16px; }
      footer { padding:12px 16px 18px 16px; flex-wrap:wrap; }
      .message { max-width:88%; }
    }
    @media (max-width:420px) {
      .mode-btn { padding:6px 14px; font-size:13px; }
      .logo { font-size:20px; }
      footer button { padding:12px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
  <div id="app">
    <header>
      <div class="logo-area"><div class="logo">ÆON <small>AI</small></div></div>
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="fast">Fast</button>
        <button class="mode-btn" data-mode="pro">Pro</button>
      </div>
      <div class="api-section">
        <input type="password" id="apiKeyInput" placeholder="sk-... masukkan API Key" />
        <button class="api-btn" id="saveKeyBtn">Simpan</button>
      </div>
    </header>
    <div id="chatContainer"></div>
    <footer>
      <input type="text" id="messageInput" placeholder="Ketik pesan, Tuan..." />
      <button id="sendBtn">Kirim</button>
    </footer>
  </div>
  <script>
    (function(){
      const chat = document.getElementById('chatContainer');
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const apiInput = document.getElementById('apiKeyInput');
      const saveBtn = document.getElementById('saveKeyBtn');
      const modeToggle = document.getElementById('modeToggle');

      let currentMode = 'fast';
      let apiKey = localStorage.getItem('aeon_api_key') || '';
      let processing = false;
      let history = [];

      if (apiKey) apiInput.value = apiKey;

      function addMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        if (sender === 'ai') {
          const wrap = document.createElement('div');
          wrap.className = 'sender';
          wrap.innerHTML = `ÆON <span>${currentMode.toUpperCase()}</span>`;
          div.appendChild(wrap);
          const c = document.createElement('div');
          c.textContent = text;
          div.appendChild(c);
        } else {
          div.textContent = text;
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function showTyping() {
        const d = document.createElement('div');
        d.className = 'typing-indicator';
        d.id = 'typingIndicator';
        for(let i=0;i<3;i++){ const s=document.createElement('span'); s.className='typing-dot'; d.appendChild(s); }
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
      }
      function hideTyping() { const el=document.getElementById('typingIndicator'); if(el) el.remove(); }

      async function sendMessage(text) {
        if (processing || !text.trim()) return;
        if (!apiKey) { addMsg('Tuan, mohon simpan API Key terlebih dahulu.', 'ai'); return; }

        addMsg(text, 'user');
        history.push({ role: 'user', content: text });

        processing = true;
        sendBtn.disabled = true;
        input.disabled = true;
        showTyping();

        try {
          const isPro = (currentMode === 'pro');
          const model = isPro ? 'gpt-4-turbo' : 'gpt-3.5-turbo';
          const maxTokens = isPro ? 1024 : 256;
          const temperature = isPro ? 0.3 : 0.7;

          // Simulasi jeda untuk Pro
          if (isPro) await new Promise(r => setTimeout(r, 1800));

          const resp = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model, messages: history, max_tokens: maxTokens, temperature, stream: false
            })
          });

          const data = await resp.json();
          hideTyping();

          if (!resp.ok) {
            const err = data.error?.message || 'Terjadi kesalahan pada API.';
            addMsg(`Tuan, ${err}`, 'ai');
            return;
          }

          const reply = data.choices[0].message.content;
          addMsg(reply, 'ai');
          history.push({ role: 'assistant', content: reply });

        } catch (e) {
          hideTyping();
          addMsg('Tuan, koneksi gagal. Periksa jaringan Anda.', 'ai');
        } finally {
          processing = false;
          sendBtn.disabled = false;
          input.disabled = false;
          input.value = '';
          input.focus();
          if (history.length > 100) history = history.slice(-80);
        }
      }

      sendBtn.addEventListener('click', ()=>sendMessage(input.value));
      input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(input.value); } });

      saveBtn.addEventListener('click', ()=>{
        const k = apiInput.value.trim();
        if (k.startsWith('sk-') && k.length>20) {
          apiKey = k;
          localStorage.setItem('aeon_api_key', k);
          addMsg('Tuan, API Key berhasil disimpan.', 'ai');
        } else {
          addMsg('Tuan, format API Key tidak valid.', 'ai');
        }
      });

      modeToggle.addEventListener('click', e=>{
        const btn = e.target.closest('.mode-btn');
        if (!btn) return;
        const mode = btn.dataset.mode;
        if (mode === currentMode) return;
        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = mode;
        addMsg(`Tuan, mode diubah ke **${mode.toUpperCase()}**. ${mode==='pro'?'Respons lebih akurat namun lebih lambat.':'Respons cepat.'}`, 'ai');
      });

      // Sapaan
      window.addEventListener('load', ()=>{
        addMsg(`Selamat datang, Tuan. Saya ÆON. Masukkan API Key OpenAI Anda di atas. Saya siap melayani.`, 'ai');
        if (apiKey) setTimeout(()=> addMsg('Tuan, API Key terdeteksi. Silakan mulai.', 'ai'), 400);
        input.focus();
      });
    })();
  </script>
</body>
</html>
